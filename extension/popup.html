<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatAdvisor</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="logo-mark">
                    <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 1.5L2 5v4c0 3 2.5 5.5 6 6 3.5-.5 6-3 6-6V5L8 1.5z"/>
                    </svg>
                </div>
                <div>
                    <h1>ThreatAdvisor</h1>
                    <p class="subtitle">URL security scanner</p>
                </div>
            </div>
        </div>

        <div class="url-card">
            <p class="url-label">Current URL</p>
            <p class="url-text" id="currentUrl">Loading...</p>
        </div>

        <button id="scanBtn" class="scan-btn">
            <span class="btn-icon">↺</span>
            <span class="btn-text">Re-scan URL</span>
        </button>

        

                <!-- Email Analysis Result -->
        <div id="emailResult" class="email-result-container hidden">
            <div class="email-result-header">
                <span class="email-icon">✉️</span>
                <span class="email-result-title">Email Analysis</span>
            </div>
            <div class="email-result-body">
                <div class="email-field">
                    <span class="field-label">Subject</span>
                    <span class="field-value" id="emailInput">—</span>
                </div>
                <div class="email-field">
                    <span class="field-label">Status</span>
                    <span class="field-value label-badge" id="emailLabel">—</span>
                </div>
                <div class="email-field">
                    <span class="field-label">Verdict</span>
                    <span class="field-value verdict-badge" id="emailPhishing">—</span>
                </div>
                <div class="email-field">
                    <span class="field-label">Confidence</span>
                    <span class="field-value confidence-value" id="emailConfidence">—</span>
                </div>
            </div>
        </div>


        <div id="result" class="result-container hidden">
            <div class="result-content" id="resultContent"></div>
        </div>



        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Scanning URL…</p>
        </div>

        <div id="error" class="error hidden">
            <p id="errorText"></p>
            <button id="dismissError" class="dismiss-btn">Dismiss</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
